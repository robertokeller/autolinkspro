# Docker Compose para desenvolvimento local
# Sobe apenas o PostgreSQL. O frontend e os microserviços rodam via npm run dev.
#
# Uso:
#   npm run db:dev         → sobe o banco em background
#   npm run dev            → inicia frontend + API + ops-control
#   npm run db:dev:stop    → para o banco

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autolinks
      POSTGRES_USER: autolinks
      POSTGRES_PASSWORD: autolinks
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autolinks -d autolinks"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_dev_data:
