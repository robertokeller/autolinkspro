# Nginx reverse proxy configuration for Coolify/VPS deployment
# Security: HTTPS-only, HSTS, security headers, rate limiting

# Upstream definitions — match docker-compose service names
upstream web_backend {
    server web:3000;
    keepalive 32;
}

upstream api_backend {
    server api:3116;
    keepalive 64;
}

upstream ops_backend {
    server ops-control:3115;
    keepalive 16;
}

upstream whatsapp_backend {
    server whatsapp:3111;
    keepalive 16;
}

upstream telegram_backend {
    server telegram:3112;
    keepalive 16;
}

upstream shopee_backend {
    server shopee:3113;
    keepalive 16;
}

upstream meli_backend {
    server meli:3114;
    keepalive 16;
}

upstream amazon_backend {
    server amazon:3117;
    keepalive 16;
}

# Security: Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=60r/s;

# Security: Block common attack patterns
map $http_user_agent $blocked_agent {
    default 0;
    # Block known bad bots and scanners
    "~*sqlmap" 1;
    "~*nikto" 1;
    "~*nmap" 1;
    "~*masscan" 1;
    "~*dirbuster" 1;
    "~*gobuster" 1;
    "~*wfuzz" 1;
    "~*hydra" 1;
    "~*curl" 0;  # Allow curl for legitimate API testing
    "~*wget" 0;  # Allow wget for legitimate use
}

# Security: Real IP from Cloudflare (if using)
# set_real_ip_from 173.245.48.0/20;
# set_real_ip_from 103.21.244.0/22;
# real_ip_header CF-Connecting-IP;

server {
    listen 80;
    server_name autolinks.pro *.autolinks.pro;

    # Security: Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name autolinks.pro *.autolinks.pro;

    # SSL Configuration — modern security
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;  # Modern browsers use CSP, not this
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https:; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Security: Block bad bots
    if ($blocked_agent) {
        return 403;
    }

    # Security: Deny hidden files (except well-known)
    location ~ /\.(?!well-known/) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Frontend (main app) ─────────────────────────────────────────────
    location / {
        proxy_pass http://web_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            limit_req zone=static_limit burst=20 nodelay;
        }
    }

    # ─── API Gateway ─────────────────────────────────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Rate limiting for API
        limit_req zone=api_limit burst=50 nodelay;

        # Timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ─── Auth endpoints (stricter rate limiting) ─────────────────────────
    location ~ ^/api/auth/(signin|signup|forgot-password|reset-password|resend-verification)$ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stricter rate limiting for auth endpoints
        limit_req zone=auth_limit burst=5 nodelay;
    }

    # ─── Kiwify Webhook ──────────────────────────────────────────────────
    location /api/webhooks/kiwify {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting for webhooks
        limit_req zone=webhook_limit burst=20 nodelay;
    }

    # ─── Ops Control (admin only) ────────────────────────────────────────
    location /ops/ {
        rewrite ^/ops/(.*) /$1 break;
        proxy_pass http://ops_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Restrict to admin IPs if needed
        # allow 192.168.1.0/24;
        # deny all;
    }

    # ─── Microservices (internal API calls from frontend) ────────────────
    location /wa-api/ {
        rewrite ^/wa-api/(.*) /$1 break;
        proxy_pass http://whatsapp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /tg-api/ {
        rewrite ^/tg-api/(.*) /$1 break;
        proxy_pass http://telegram_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /shopee-api/ {
        rewrite ^/shopee-api/(.*) /$1 break;
        proxy_pass http://shopee_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /meli-api/ {
        rewrite ^/meli-api/(.*) /$1 break;
        proxy_pass http://meli_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /amazon-api/ {
        rewrite ^/amazon-api/(.*) /$1 break;
        proxy_pass http://amazon_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check (for monitoring) ───────────────────────────────────
    location /health {
        proxy_pass http://api_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Metrics (ops-token protected) ───────────────────────────────────
    location /metrics {
        proxy_pass http://api_backend/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ─── Default: deny everything else ───────────────────────────────────
    location / {
        return 404;
    }
}
